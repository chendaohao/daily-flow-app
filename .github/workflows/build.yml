name: Build Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        run: pnpm tauri build

      - name: List build outputs
        shell: pwsh
        run: |
          Write-Host "=== target/release ==="
          Get-ChildItem src-tauri/target/release -Filter "*.exe" | Select-Object Name, Length
          Write-Host "=== bundle/msi ==="
          Get-ChildItem src-tauri/target/release/bundle/msi -ErrorAction SilentlyContinue | Select-Object Name, Length
          Write-Host "=== bundle/nsis ==="
          Get-ChildItem src-tauri/target/release/bundle/nsis -ErrorAction SilentlyContinue | Select-Object Name, Length

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item src-tauri/target/release/daily-flow-app.exe dist/ -ErrorAction SilentlyContinue
          Get-ChildItem src-tauri/target/release/bundle/msi -Filter "*.msi" -ErrorAction SilentlyContinue | Copy-Item -Destination dist/ -ErrorAction SilentlyContinue
          Get-ChildItem src-tauri/target/release/bundle/nsis -Filter "*-setup.exe" -ErrorAction SilentlyContinue | Copy-Item -Destination dist/ -ErrorAction SilentlyContinue
          Write-Host "=== dist ==="
          Get-ChildItem dist | Select-Object Name, Length

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-flow-windows
          path: dist/
          if-no-files-found: error

      - name: Upload release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
