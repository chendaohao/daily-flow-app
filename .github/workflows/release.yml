name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item src-tauri/target/release/daily-flow-app.exe dist/
          Get-ChildItem src-tauri/target/release/bundle/msi -Filter "*.msi" | Copy-Item -Destination dist/
          Get-ChildItem src-tauri/target/release/bundle/nsis -Filter "*-setup.exe" | Copy-Item -Destination dist/

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v1
        with:
          name: Daily Flow ${{ github.ref_name }}
          draft: true
          files: dist/*
